# Multi-shop chatbot — local + deploy stack (ADR-001, SPEC §14)
# Services: api, celery_worker, celery_beat, redis, flower
services:
  api:
    build: .
    image: mscbot-api:latest
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  celery_worker:
    build: .
    image: mscbot-api:latest
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  celery_beat:
    build: .
    image: mscbot-api:latest
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  flower:
    build: .
    image: mscbot-api:latest
    command: celery -A app.tasks.celery_app flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped
