name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        # tests are hermetic: conftest.py injects dummy settings env, fakeredis stands in for Redis,
        # and every network edge is stubbed — no secrets or services needed (see docs/SECURITY-AUDIT.md).
        env:
          PYTHONPATH: src:config:.
          PYTHONIOENCODING: utf-8
        run: pytest -q
